services:
  - type: web
    name: satis-attribution-backend
    runtime: python
    plan: free
    autoDeployTrigger: commit
    buildCommand: pip install .
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /health/database
    envVars:
      - key: PYTHON_VERSION
        value: 3.14.3
      - key: DATABASE_CONNECT_TIMEOUT
        value: "5"